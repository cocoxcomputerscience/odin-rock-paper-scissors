<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <!--<meta name="viewport" content="width=device-width, initial-scale=1.0">-->
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="./styles.css">
        <script src="./script.js" defer></script>
    </head>

    <body>
        <header id="header">
            <img id="header-decor" src="./images/header-decor.svg" alt="dual swords">
            <h1>SWORD AXE LANCE</h1>
            <img id="header-decor" src="./images/header-decor.svg" alt="dual swords">
        </header>
        <main>
            <section id="rules">
                <h2>RULES</h2>
                <ul>
                    <li>CHOOSE YOUR WEAPON OF CHOICE</li>
                    <li>SWORD BEATS AXE &emsp;|&emsp; AXE BEATS LANCE &emsp;|&emsp; LANCE BEATS SWORD</li>
                    <li>WHEN 5 POINTS ARE REACHED, THE GAME IS OVER</li>
                </ul>
            </section>
    
            <section id="weapons">
                <button id="sword"></button>
                <button id="axe"></button>
                <button id="lance"></button>
            </section>
    
            <section id="result">
                <h2>RESULT</h2>
                <div id="scoreboard-container">
                    <div id="scoreboard">
                        <div id="scoreboard-player">
                            <h4>YOU</h4>
                            <p id="player-tally">0</p>
                        </div>
                        <div id="scoreboard-computer">
                            <h4>AI</h4>
                            <p id="computer-tally">0</p>
                        </div>
                    </div>
                    <div id="scoreboard-logic">
                        <p id="player-selection-display">YOU CHOSE:</p>
                        <p id="computer-selection-display">AI CHOSE:</p>
                    </div>
                </div>
                <p id="result-text"></p>
            </section>
        </main>
        <footer id="footer">
            <p>&#169; Copyright 2023 cocoxcomputerscience@gmail.com</p>
        </footer>
    </body>
</html>
